<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星火网络安全中心</title>
    <style>
        body { margin: 0; padding: 0; background: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* 微信内遮罩容器 */
        .weixin-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 9999; box-sizing: border-box; overflow: hidden; }
        
        /* 右上角高亮指向动画 */
        .arrow-box { position: absolute; top: 15px; right: 20px; text-align: right; animation: bounce 1.5s infinite ease-in-out; }
        .arrow-svg { width: 45px; height: 45px; transform: rotate(-10deg); fill: #007aff; }
        
        /* 安全核心卡片布局 */
        .security-card { width: 90%; max-width: 400px; margin: 120px auto 0 auto; background: #ffffff; border-radius: 20px; text-align: center; padding: 40px 24px; box-sizing: border-box; }
        
        /* 科技感安全盾牌动画 */
        .shield-wrapper { position: relative; width: 80px; height: 80px; margin: 0 auto 25px auto; }
        .shield-bg { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: rgba(0, 122, 255, 0.08); animation: pulse 2s infinite ease-in-out; }
        .shield-icon { position: absolute; top: 18px; left: 20px; width: 40px; height: 44px; fill: #007aff; }
        
        /* 文本层次 */
        .title { font-size: 20px; color: #1d1d1f; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px; }
        .subtitle { font-size: 13px; color: #007aff; font-weight: 500; background: rgba(0, 122, 255, 0.06); display: inline-block; padding: 3px 12px; border-radius: 50px; margin-bottom: 24px; }
        
        /* 操作指引卡片 */
        .guide-box { background: #f8fafc; border: 1px solid #edf2f7; border-radius: 14px; padding: 20px; text-align: left; margin-bottom: 30px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.01); }
        .step-item { display: flex; align-items: flex-start; margin-bottom: 14px; font-size: 14px; color: #4a5568; line-height: 1.5; }
        .step-item:last-child { margin-bottom: 0; }
        .step-num { width: 20px; height: 20px; background: #007aff; color: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; margin-right: 12px; flex-shrink: 0; margin-top: 1px; }
        .highlight { color: #007aff; font-weight: 600; }
        
        /* 页脚声明 */
        .footer { position: absolute; bottom: 30px; left: 0; width: 100%; text-align: center; font-size: 12px; color: #a0aec0; letter-spacing: 0.3px; }
        
        /* 普通浏览器加载提示 */
        .browser-tip { display: block; text-align: center; margin-top: 150px; color: #718096; font-size: 14px; }
        .loading-spinner { width: 32px; height: 32px; border: 3px solid rgba(0,122,255,0.1); border-radius: 50%; border-top-color: #007aff; margin: 0 auto 15px auto; animation: spin 0.8s linear infinite; }

        /* 动画帧定义 */
        @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.05); } }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 0.4; } 100% { transform: scale(0.9); opacity: 0.8; } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="weixinTip" class="weixin-container">
        <div class="arrow-box">
            <svg class="arrow-svg" viewBox="0 0 24 24">
                <path d="M19 4h-4c-.6 0-1 .4-1 1s.4 1 1 1h2.6L11.3 12.3c-.4.4-.4 1 0 1.4.2.2.4.3.7.3.3 0 .5-.1.7-.3L20 7.4V10c0 .6.4 1 1 1s1-.4 1-1V5c0-.6-.4-1-1-1zm-4 14H5V8h6c.6 0 1-.4 1-1s-.4-1-1-1H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-7c0-.6-.4-1-1-1s-1 .4-1 1v6z"/>
            </svg>
        </div>

        <div class="security-card">
            <div class="shield-wrapper">
                <div class="shield-bg"></div>
                <svg class="shield-icon" viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 15l-4-4 1.41-1.41L10 13.17l7.59-7.59L19 7l-9 9z"/>
                </svg>
            </div>
            
            <div class="title">专线托管域加密通道</div>
            <div class="subtitle">🔒 全链路安全防护已开启</div>
            
            <div class="guide-box">
                <div class="step-item">
                    <div class="step-num">1</div>
                    <div>点击屏幕右上角的菜单按键 <span class="highlight">「 ··· 」</span></div>
                </div>
                <div class="step-item">
                    <div class="step-num">2</div>
                    <div>在弹出的面板中选择 <span class="highlight">「 在浏览器中打开 」</span></div>
                </div>
            </div>
            
            <div style="font-size: 13px; color: #718096;">即可秒级同步分公司鉴权数据并进入系统</div>
        </div>

        <div class="footer">星火猎才自动化架构 · 安全风控大脑</div>
    </div>

    <div id="browserTip" class="browser-tip">
        <div class="loading-spinner"></div>
        <div>星火链盾正在校验安全环境，请稍候...</div>
    </div>

    <script>
        const params = window.location.search;
        const ua = navigator.userAgent.toLowerCase();
        const isWeixin = ua.indexOf('micromessenger') !== -1;

        // 核心跳转逻辑（维持原汁原味的工号参数转发）
        let targetPage = "register.html";
        if (params.includes("job=")) {
            targetPage = "apply.html";
        }
        const finalUrl = "https://zhaopin.cc.cd/frontend/" + targetPage + params;

        if (isWeixin) {
            // 微信环境下拦截跳转，展现高端科技风控UI
            document.getElementById('weixinTip').style.display = 'block';
            document.getElementById('browserTip').style.display = 'none';
        } else {
            // 外部安全浏览器，全速放行
            window.location.replace(finalUrl);
        }
    </script>
</body>
</html>
