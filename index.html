<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安全通道加载中...</title>
    <style>
        body { margin: 0; padding: 0; background: #f8f9fa; font-family: -apple-system, sans-serif; }
        .weixin-tip { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 999; text-align: center; padding-top: 60px; }
        .browser-tip { display: block; text-align: center; margin-top: 100px; color: #666; font-size: 15px; }
    </style>
</head>
<body>

    <div id="weixinTip" class="weixin-tip">
        <div style="font-size: 20px; color: #fa5151; font-weight: bold; margin-bottom: 15px;">⚠️ 微信安全限制</div>
        <div style="font-size: 16px; color: #333; line-height: 1.8; margin-bottom: 30px; padding: 0 20px;">
            请点击右上角 <span style="font-size: 24px; font-weight: bold; color: #007aff;">···</span><br>
            选择 <span style="color: #007aff; font-weight: bold; font-size: 18px;">“在浏览器中打开”</span><br>
            以确保正常进入登记通道。
        </div>
        <div style="color: #999; font-size: 13px;">星火猎才官方保障通道</div>
    </div>

    <div id="browserTip" class="browser-tip">
        正在进入星火猎才安全通道，请稍候...
    </div>

    <script>
        // 1. 自动捕获全部传递过来的工号和岗位参数
        const params = window.location.search;
        const ua = navigator.userAgent.toLowerCase();
        
        // 2. 识别当前是否处于微信环境
        const isWeixin = ua.indexOf('micromessenger') !== -1;

        // 3. 动态分流目标页面
        let targetPage = "register.html";
        if (params.includes("job=")) {
            targetPage = "apply.html";
        }
        const finalUrl = "https://zhaopin.cc.cd/frontend/" + targetPage + params;

        if (isWeixin) {
            // 如果在微信里，弹窗拦截，并展示引导出坑的遮罩
            document.getElementById('weixinTip').style.display = 'block';
            document.getElementById('browserTip').style.display = 'none';
        } else {
            // 一旦跳出微信到了外部浏览器，完全合规安全，秒级带参数闪现过去！
            window.location.replace(finalUrl);
        }
    </script>
</body>
</html>
